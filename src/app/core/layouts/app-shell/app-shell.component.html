<div class="shell">
  <header class="topbar">
    <div class="sidebar__brand">
      <div class="brand__mark">B</div>
      <div class="brand__name">Barren</div>
    </div>
    <div class="topbar__right">
      <button class="btn btn--ghost" type="button">My Home</button>
      <button class="btn btn--ghost" type="button">Explore Events</button>
      <button class="btn btn--primary" type="button">Create Event</button>
      <button class="avatar" type="button">
        <span>JD</span>
      </button>
    </div>
  </header>
  <aside class="sidebar">
    <nav class="sidebar__nav">
      <button
        class="nav-item"
        type="button"
        routerLink="/dashboard"
        routerLinkActive="nav-item--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="nav-item__icon">🏠</span>
        <span class="nav-item__label">Dashboard</span>
      </button>
      <button
        class="nav-item"
        type="button"
        routerLink="/events"
        routerLinkActive="nav-item--active"
      >
        <span class="nav-item__icon">🎟️</span>
        <span class="nav-item__label">Events</span>
      </button>
      <button class="nav-item" type="button">
        <span class="nav-item__icon">📣</span>
        <span class="nav-item__label">Promotion</span>
      </button>
      <button class="nav-item" type="button">
        <span class="nav-item__icon">📇</span>
        <span class="nav-item__label">Contact List</span>
      </button>
      <button class="nav-item" type="button">
        <span class="nav-item__icon">💸</span>
        <span class="nav-item__label">Payouts</span>
      </button>
      <button class="nav-item" type="button">
        <span class="nav-item__icon">📊</span>
        <span class="nav-item__label">Reports</span>
      </button>
      <button class="nav-item" type="button">
        <span class="nav-item__icon">🔁</span>
        <span class="nav-item__label">Subscription</span>
      </button>
      <button class="nav-item" type="button">
        <span class="nav-item__icon">⚙️</span>
        <span class="nav-item__label">Conversion Setup</span>
      </button>
      <button class="nav-item" type="button">
        <span class="nav-item__icon">👥</span>
        <span class="nav-item__label">My Team</span>
      </button>
    </nav>
  </aside>

  <div class="main">
    <main class="content">
      <ng-content />
    </main>
  </div>
</div>
